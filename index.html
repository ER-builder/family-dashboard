      });
    }
    function nowMinutesLondon() {
      // Use toLocaleTimeString which is widely supported on old WebViews
      // (formatToParts can fail or be unimplemented on older Chromium).
      try {
        const s = new Date().toLocaleTimeString("en-GB", {
          timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
        });
        const m = s.match(/(\d{1,2}):(\d{2})/);
        if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      } catch (e) {}
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }
    // Belt-and-suspenders: set both the HTML attribute and style.display.
    // Old Android WebViews sometimes ignore .hidden property assignment.
    function setCardVisible(id, visible) {
      const el = document.getElementById(id);
      if (!el) return;
      if (visible) {
        el.removeAttribute("hidden");
        el.style.display = "";
      } else {
        el.setAttribute("hidden", "");
        el.style.display = "none";
      }
    }
    function isWeekendLondon() {
      // Robust on old WebViews — toLocaleDateString with weekday is well-supported.
      try {
        const wd = new Date().toLocaleDateString("en-GB", { timeZone: TZ, weekday: "short" });
        return /^(Sat|Sun)/i.test(wd);
      } catch (e) {
        const day = new Date().getDay(); // 0=Sun,6=Sat
        return day === 0 || day === 6;
      }
    }
    // UX redesign D + E.1 (2026-04-26): primary panel mode picker.
    // Sets body[data-mode] to "morning" | "evening" | "todo" — CSS rules in
    // the .primary-panel block show exactly one child for the active mode.
    // Replaces the old setCardVisible + body.routine-active mechanism.
    function pickMode() {
      // Dev / testing override: ?mode=morning|evening|todo forces a mode for
      // the current page load. Lets us test routines outside their windows
      // (e.g. preview morning at 11am from a laptop browser). No persistence —
      // a normal reload without the query goes back to time-based logic.
      try {
        const params = new URLSearchParams(window.location.search);
        const override = params.get("mode");
        if (override === "morning" || override === "evening" || override === "todo") {
          return override;
        }
      } catch (_) {}
      try {
        const mins = nowMinutesLondon();
        const weekend = isWeekendLondon();
        // Morning routine = weekday school prep only.
        if (!weekend && mins >= 6 * 60 && mins < 9 * 60) return "morning";
        // Evening routine = every day (incl. weekends).
        if (mins >= 15 * 60 + 30 && mins < 20 * 60 + 30) return "evening";
        return "todo";
      } catch (e) {
        return "todo";  // safe default — todo always works
      }
    }
    function updateMode() {
      // Don't clobber the spotify card while it's open — its own auto-close
      // timer (90s) will return us to the time-of-day mode. Without this guard,
      // the 60s interval below stomps on data-mode mid-play.
      if (document.body.getAttribute("data-mode") === "spotify") return;
      const mode = pickMode();
      document.body.setAttribute("data-mode", mode);
      // Backwards-compat: keep the routine-active class around in case any
      // straggler CSS still references it (transit + stars rules — both removed
      // from markup but the rule itself doesn't hurt).
      document.body.classList.toggle("routine-active", mode === "morning" || mode === "evening");
    }
    renderRoutines();
    updateMode();
    setInterval(() => { renderRoutines(); updateMode(); }, 60 * 1000);

    loadWeather();
    loadHourly();
    setInterval(() => { loadWeather(); loadHourly(); }, 15 * 60 * 1000); // every 15 min

    // ---------- Calendar (Google-Cal-style day view, via Vercel proxy) ----------
    const CAL_PROXY_URL = "https://family-dashboard-proxy.vercel.app/api/cal";
    const DAY_START_H = 6;       // timeline starts 06:00
    const DAY_END_H   = 22;      // timeline ends 22:00 (16 hour rules: 06..21)
    const HOUR_H      = 26;      // px per hour, must match --hour-h CSS var

    function dayKey(d) {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(d);
    }
    function dayLabel(d) {
      const today = dayKey(new Date());
      const tomorrow = dayKey(new Date(Date.now() + 86400000));
      const k = dayKey(d);
      const human = new Intl.DateTimeFormat("en-GB", { timeZone: TZ, weekday: "long", day: "numeric", month: "short" }).format(d);
      if (k === today) return { label: "Today · " + human, today: true };
      if (k === tomorrow) return { label: "Tomorrow · " + human, today: false };
      return { label: human, today: false };
    }
    function fmtTime(d) {
      return new Intl.DateTimeFormat("en-GB", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false }).format(d);
    }
    // London-tz minutes-since-midnight for any Date
    function londonMins(d) {
      try {
        const s = new Intl.DateTimeFormat("en-GB", {
          timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
        }).format(d);
        const m = s.match(/(\d{1,2}):(\d{2})/);
        if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      } catch (e) {}
      return d.getHours() * 60 + d.getMinutes();
    }

    async function loadCalendar() {
      try {
        const res = await fetch(CAL_PROXY_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const { events } = await res.json();
        renderCalendar(events || []);
      } catch (err) {
        const future = document.getElementById("cal-future");
        if (future) {
          while (future.firstChild) future.removeChild(future.firstChild);
          const wrap = document.createElement("div");
          wrap.className = "cal-error";
          wrap.appendChild(document.createTextNode("Calendar unavailable"));
          const small = document.createElement("small");
          small.textContent = String(err.message || err);
          wrap.appendChild(small);
          future.appendChild(wrap);
        }
      }
    }

    // Build a CSS class fragment from event.source (Family/Elul/School/etc).
    // Sanitized to a slug so we can target ".source-family", ".source-elul" etc.
    function sourceClass(ev) {
      if (!ev || !ev.source) return "";
      const slug = String(ev.source).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      return slug ? " source-" + slug : "";
    }

    function renderCalendar(events) {
      const allDayEl = document.getElementById("cal-allday");
      const todayEl  = document.getElementById("cal-today");
      const futureEl = document.getElementById("cal-future");
      if (!allDayEl || !todayEl || !futureEl) return;
      [allDayEl, todayEl, futureEl].forEach(el => {
        while (el.firstChild) el.removeChild(el.firstChild);
      });

      const today = dayKey(new Date());
      const todayAllDay = [];
      const todayTimed = [];
      const futureByDay = new Map();
      for (const ev of events) {
        const start = new Date(ev.start);
        const k = dayKey(start);
        if (k === today) {
          (ev.allDay ? todayAllDay : todayTimed).push(ev);
        } else if (k > today) { // future only
          if (!futureByDay.has(k)) futureByDay.set(k, { date: start, items: [] });
          futureByDay.get(k).items.push(ev);
        }
      }

      // ─── All-day chips
      todayAllDay.forEach(ev => {
        const c = document.createElement("div");
        c.className = "chip" + sourceClass(ev);
        c.textContent = ev.title;
        allDayEl.appendChild(c);
      });

      // ─── Today timeline: hour markers
      for (let h = DAY_START_H; h <= DAY_END_H - 1; h++) {
        const m = document.createElement("div");
        m.className = "hour-mark";
        m.style.top = ((h - DAY_START_H) * HOUR_H) + "px";
        const lbl = document.createElement("span");
        lbl.className = "h-label";
        lbl.textContent = String(h).padStart(2, "0");
        m.appendChild(lbl);
        todayEl.appendChild(m);
      }

      // ─── Now-line (positioned each tick)
      const nowLine = document.createElement("div");
      nowLine.className = "cal-now";
      nowLine.id = "cal-now";
      todayEl.appendChild(nowLine);

      // ─── Event blocks (overlap-aware layout)
      const nowMins = nowMinutesLondon();
      const visibleMins = (DAY_END_H - DAY_START_H) * 60;

      // Lay out overlapping events into horizontal tracks (Google-Cal style).
      // Sort by start asc (then by longer-first as a tiebreaker so big events
      // get column 0). Greedy column assignment: each event takes the
      // lowest-numbered track whose previous occupant has ended. Then group
      // events into clusters of mutually-overlapping events; every event in a
      // cluster uses the same column count = max columns in that cluster, so
      // tracks within a cluster line up evenly.
      function layoutOverlaps(items) {
        const sorted = items
          .map(ev => ({
            ev,
            startMs: new Date(ev.start).getTime(),
            endMs: Math.max(new Date(ev.start).getTime() + 1, new Date(ev.end).getTime())
          }))
          .sort((a, b) => a.startMs - b.startMs || b.endMs - a.endMs);
        // Step 1: assign each event to the lowest available column.
        const tracks = []; // tracks[c] = endMs of last event placed in column c
        sorted.forEach(item => {
          let col = tracks.findIndex(end => end <= item.startMs);
          if (col === -1) { col = tracks.length; tracks.push(0); }
          tracks[col] = item.endMs;
          item.col = col;
        });
        // Step 2: group into clusters of mutually-overlapping events.
        let clusterStart = 0;
        let clusterMaxEnd = sorted.length ? sorted[0].endMs : 0;
        const clusters = [];
        for (let i = 1; i < sorted.length; i++) {
          if (sorted[i].startMs >= clusterMaxEnd) {
            clusters.push({ start: clusterStart, end: i - 1 });
            clusterStart = i;
            clusterMaxEnd = sorted[i].endMs;
          } else {
            clusterMaxEnd = Math.max(clusterMaxEnd, sorted[i].endMs);
          }
        }
        if (sorted.length) clusters.push({ start: clusterStart, end: sorted.length - 1 });
        // Step 3: each cluster's totalCols = max(col+1) in that cluster.
        clusters.forEach(c => {
          let maxCol = 0;
          for (let i = c.start; i <= c.end; i++) maxCol = Math.max(maxCol, sorted[i].col);
          for (let i = c.start; i <= c.end; i++) sorted[i].totalCols = maxCol + 1;
        });
        return sorted;
      }

      const laidOut = layoutOverlaps(todayTimed);
      laidOut.forEach(({ ev, col, totalCols }) => {
        const sM = londonMins(new Date(ev.start));
        const eM = londonMins(new Date(ev.end));
        const startOff = sM - DAY_START_H * 60;
        const endOff   = eM - DAY_START_H * 60;
        if (endOff <= 0 || startOff >= visibleMins) return;   // outside visible window
        const clampedStart = Math.max(0, startOff);
        const clampedEnd   = Math.min(visibleMins, endOff);
        const top = (clampedStart / 60) * HOUR_H;
        const height = Math.max(26, ((clampedEnd - clampedStart) / 60) * HOUR_H);

        const block = document.createElement("div");
        block.className = "cal-block" + (eM <= nowMins ? " past" : "") + sourceClass(ev);
        block.style.top = top + "px";
        block.style.height = height + "px";
        block.style.setProperty("--col", String(col));
        block.style.setProperty("--total", String(totalCols));
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = ev.title;
        const when = document.createElement("div");
        when.className = "when";
        when.textContent = `${fmtTime(new Date(ev.start))}–${fmtTime(new Date(ev.end))}`;
        block.append(title, when);
        if (ev.location) block.title = ev.location;
        todayEl.appendChild(block);
      });
      positionNowLine();

      // ─── Future days — only tomorrow, to keep the card compact
      let dayCount = 0;
      for (const [, g] of futureByDay) {
        if (++dayCount > 1) break;
        const head = document.createElement("div");
        head.className = "day-head";
        head.textContent = dayLabel(g.date).label;
        futureEl.appendChild(head);
        g.items.slice(0, 5).forEach(ev => {
          const row = document.createElement("div");
          row.className = "row" + sourceClass(ev);
          const t = document.createElement("div");
          t.className = "t";
          t.textContent = ev.allDay ? "all day" : fmtTime(new Date(ev.start));
          const ti = document.createElement("div");
          ti.className = "ti";
          ti.textContent = ev.title;
          row.append(t, ti);
          futureEl.appendChild(row);
        });
      }

      if (!todayAllDay.length && !todayTimed.length && !futureByDay.size) {
        const empty = document.createElement("div");
        empty.className = "cal-empty";
        empty.textContent = "A quiet stretch ahead.";
        futureEl.appendChild(empty);
      }
    }

    function positionNowLine() {
      const el = document.getElementById("cal-now");
      if (!el) return;
      const m = nowMinutesLondon();
      const startM = DAY_START_H * 60;
      const endM = DAY_END_H * 60;
      if (m < startM || m > endM) {
        el.style.display = "none";
        return;
      }
      el.style.display = "block";
      el.style.top = (((m - startM) / 60) * HOUR_H) + "px";
    }

    loadCalendar();
    setInterval(loadCalendar, 5 * 60 * 1000); // refetch every 5 min
    setInterval(positionNowLine, 60 * 1000);  // move the now-line every minute

    // ---------- TfL transit (Northern Line + Bus 102) ----------
    // TfL severity scale: 10 = Good Service, 9 = Minor Delays, 6 or below = Severe.
    //
    // Live bus arrivals: fill in TFL_STOPS with stop IDs from
    //   https://tfl.gov.uk/bus/route/102/  → click stop on map → URL contains the StopID.
    // Stop IDs are short codes like "490004733E" (letter at end = direction).
    const TFL_STOPS = [
      { id: "490004463E", route: "102", dest: "East Finchley" },
      { id: "490004463W", route: "102", dest: "Golders Green" },
    ];

    // Cache scheduled timetables for the day so we don't refetch every 30s.
    const _tflTimetableCache = {}; // key: stopId|route|YYYY-MM-DD → ["HH:MM", ...]
    async function fetchScheduledTimes(stop) {
      const today = new Date().toLocaleDateString("en-CA", { timeZone: TZ });
      const key = `${stop.id}|${stop.route}|${today}`;
      if (_tflTimetableCache[key]) return _tflTimetableCache[key];
      try {
        const res = await fetch(`https://api.tfl.gov.uk/Line/${stop.route}/Timetable/${stop.id}`, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        // Find today's schedule by name match (e.g. "Friday", "Mon-Fri", "Saturday").
        const todayName = new Date().toLocaleDateString("en-GB", { timeZone: TZ, weekday: "long" });
        const schedules = data?.timetable?.routes?.[0]?.schedules || [];
        const today3 = todayName.slice(0, 3);
        const match = schedules.find(s => {
          const n = (s.name || "").toLowerCase();
          return n.includes(todayName.toLowerCase())
              || n.includes(today3.toLowerCase())
              || (today3 !== "Sat" && today3 !== "Sun" && /mon-?fri|weekday/.test(n));
        }) || schedules[0];
        const journeys = match?.knownJourneys || [];
        const times = journeys.map(j => `${String(j.hour).padStart(2, "0")}:${String(j.minute).padStart(2, "0")}`);
        _tflTimetableCache[key] = times;
        return times;
      } catch (e) {
        return [];
      }
    }

    function nextScheduled(times, k = 3) {
      const now = new Date();
      const nowMin = now.toLocaleTimeString("en-GB", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false });
      const [hN, mN] = nowMin.split(":").map(Number);
      const cur = hN * 60 + mN;
      return times
        .map(t => { const [h, m] = t.split(":").map(Number); return { t, mins: h * 60 + m }; })
        .filter(x => x.mins >= cur)
        .sort((a, b) => a.mins - b.mins)
        .slice(0, k);
    }

    // Sequential rewrite — no nested Promise.all, no optional chaining of array
    // index access. Old Portal Chromium occasionally chokes on these and the
    // whole render aborts silently. Keeps a tiny diagnostic line at the bottom
    // of the arrivals container so we can SEE on Terry whether render ran.
    async function loadTflArrivals() {
      const container = document.getElementById("tfl-102-arrivals");
      if (!container) return;
      if (!TFL_STOPS.length) {
        container.setAttribute("hidden", "");
        container.style.display = "none";
        return;
      }

      const rows = [];
      let liveCount = 0, schedCount = 0, errCount = 0;

      for (let si = 0; si < TFL_STOPS.length; si++) {
        const s = TFL_STOPS[si];
        let live = [];
        let stopErr = false;
        try {
          const res = await fetch(
            "https://api.tfl.gov.uk/StopPoint/" + encodeURIComponent(s.id) + "/Arrivals?mode=bus",
            { cache: "no-store" }
          );
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          if (Array.isArray(data)) {
            live = data.filter(function (a) { return a && a.lineId === s.route; })
                       .sort(function (a, b) { return a.timeToStation - b.timeToStation; })
                       .slice(0, 3);
          }
        } catch (e) {
          stopErr = true;
        }

        const dest = "→ " + escapeHtml(s.dest);

        if (stopErr) {
          errCount++;
          rows.push('<div class="arr-row"><span class="dest">' + dest + '</span><span class="none">offline</span></div>');
          continue;
        }

        if (live.length) {
          liveCount += live.length;
          const parts = [];
          for (let i = 0; i < live.length; i++) {
            const mins = Math.round(live[i].timeToStation / 60);
            const cell = (mins <= 0)
              ? '<span class="t due">Due</span>'
              : '<span class="t">' + mins + '<span class="u">min</span></span>';
            parts.push((i > 0 ? '<span class="sep">·</span>' : '') + cell);
          }
          rows.push('<div class="arr-row"><span class="dest">' + dest + '</span><span class="times">' + parts.join(' ') + '</span></div>');
          continue;
        }

        // Live empty → schedule fallback
        let sched = [];
        try { sched = await fetchScheduledTimes(s); } catch (_) { sched = []; }
        const upcoming = nextScheduled(sched, 3);
        if (!upcoming.length) {
          rows.push('<div class="arr-row"><span class="dest">' + dest + '</span><span class="none">no buses today</span></div>');
          continue;
        }
        schedCount += upcoming.length;
        const nowM = nowMinutesLondon();
        const sparts = [];
        for (let i = 0; i < upcoming.length; i++) {
          const delta = upcoming[i].mins - nowM;
          let cell;
          if (delta <= 0)       cell = '<span class="t due">Due</span>';
          else if (delta < 60)  cell = '<span class="t sched">' + delta + '<span class="u">min</span></span>';
          else                  cell = '<span class="t sched">' + escapeHtml(upcoming[i].t) + '</span>';
          sparts.push((i > 0 ? '<span class="sep">·</span>' : '') + cell);
        }
        rows.push('<div class="arr-row"><span class="dest">' + dest + '</span><span class="times">' + sparts.join(' ') + '<span class="sched-tag">scheduled</span></span></div>');
      }

      container.innerHTML = rows.join("");
      container.removeAttribute("hidden");
      container.style.display = "";

      // If we got LIVE arrivals (predictions, not just scheduled), hide the
      // line's "Good Service" pill — the live times convey the same info more
      // usefully. If only scheduled fallback or all errors, keep the pill so
      // the user still has the line-status signal.
      const tfl102 = document.getElementById("tfl-102");
      if (tfl102) {
        if (liveCount > 0) tfl102.classList.add("has-arrivals");
        else               tfl102.classList.remove("has-arrivals");
      }
    }

    async function loadTfl() {
      const lines = [
        { id: "northern", el: "tfl-northern" },
        { id: "102",      el: "tfl-102" }
      ];
      await Promise.all(lines.map(async ({ id, el }) => {
        const row = document.getElementById(el);
        const span = row && row.querySelector(".status");
        if (!span) return;
        try {
          const res = await fetch(`https://api.tfl.gov.uk/Line/${id}/Status`, { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          const desc = data?.[0]?.lineStatuses?.[0]?.statusSeverityDescription || "Unknown";
          const sev  = data?.[0]?.lineStatuses?.[0]?.statusSeverity ?? 10;
          const tone = sev >= 10 ? "good" : sev >= 7 ? "minor" : "severe";
          span.textContent = desc;
          span.classList.remove("good", "minor", "severe");
          span.classList.add(tone);
        } catch (e) {
          span.textContent = "Unavailable";
          span.classList.remove("good", "minor");
          span.classList.add("severe");
        }
      }));
    }
    loadTfl();
    setInterval(loadTfl, 5 * 60 * 1000); // line status every 5 min
    loadTflArrivals();
    setInterval(loadTflArrivals, 30 * 1000); // bus arrivals every 30s

    // ---------- Table Stars mirror (read-only card in the off-routine ambient slot) ----------
    // Keyed public endpoint — the key gates a low-sensitivity summary (prize_count,
    // cycle_progress, last_earned_at), same posture as OPENWEATHER_API_KEY above.
    const STARS_ENDPOINT =
      "https://tablestars.erapps.xyz/api/public/stats?key=810c212871db6636f5b773b301f4a5e7d56bc51aaf88b657";
    const _lastPrizeCount = {}; // kid.id -> last seen prize_count (drives pulse)
    const _lastCycleProgress = {}; // kid.id -> last seen cycle_progress (drives pulse)

    function slugKid(name) {
      return (name || "").toLowerCase().replace(/[^a-z]/g, "");
    }

    // Compact context-strip rendering: per-kid row with prize count (slow,
    // celebratory milestone) AND cycle progress X/10 (fast daily-effort metric).
    // Both pulse on increment between polls. Cycle highlights kid-accent when full.
    function renderStars(kids) {
      const body = document.getElementById("stars-body");
      if (!body) return;
      if (!kids || !kids.length) {
        body.innerHTML = "";
        return;
      }
      const rows = kids.map(function(k) {
        const slug = slugKid(k.name);
        const pc = k.prize_count || 0;
        const cycle = Math.max(0, Math.min(10, k.cycle_progress || 0));
        const cycleClass = "cycle" + (cycle >= 10 ? " full" : "");
        const idAttr = escapeHtml(k.id);
        return (
          '<div class="kid" data-kid="' + escapeHtml(slug) + '" data-id="' + idAttr + '">' +
            '<span class="label">' + escapeHtml(k.emoji || "🎁") + ' ' + escapeHtml(k.name || "") + '</span>' +
            '<span class="count">' + pc + '</span>' +
            '<span class="' + cycleClass + '"><span class="star">⭐</span>' + cycle + '/10</span>' +
          '</div>'
        );
      });
      body.innerHTML = rows.join("");

      // Pulse on increment for both metrics.
      kids.forEach(function(k) {
        const id = String(k.id);
        const sel = '.kid[data-id="' + CSS.escape(id) + '"]';

        const prevPc = _lastPrizeCount[k.id];
        const nowPc = k.prize_count || 0;
        if (prevPc !== undefined && nowPc > prevPc) {
          const el = body.querySelector(sel + " .count");
          if (el) {
            el.classList.add("pulse");
            setTimeout(function() { el.classList.remove("pulse"); }, 320);
          }
        }
        _lastPrizeCount[k.id] = nowPc;

        const prevCy = _lastCycleProgress[k.id];
        const nowCy = Math.max(0, Math.min(10, k.cycle_progress || 0));
        if (prevCy !== undefined && nowCy > prevCy) {
          const el = body.querySelector(sel + " .cycle");
          if (el) {
            el.classList.add("pulse");
            setTimeout(function() { el.classList.remove("pulse"); }, 320);
          }
        }
        _lastCycleProgress[k.id] = nowCy;
      });
    }

    async function loadStars() {
      try {
        const res = await fetch(STARS_ENDPOINT, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderStars(data && data.kids);
      } catch (e) {
        // Silent fail — leaves card hidden (or showing last-good state) rather than
        // flashing an error row in the kitchen. Retry on next poll.
      }
    }
    loadStars();
    setInterval(loadStars, 30 * 60 * 1000); // stars change 1-2x per day; 30 min is plenty


    // ─────────────────────────────────────────────────────────────────────────
    // SPOTIFY -- now-playing ambient card + full player card + launch button
    // ─────────────────────────────────────────────────────────────────────────
    // Proxy endpoint (Vercel). Returns { isPlaying, track, artist, albumArt, ... }
    // Set to "" to disable the feature gracefully (card stays hidden).
    const SPOTIFY_PROXY_URL = "https://family-dashboard-proxy.vercel.app/api/spotify-now";

    let _spIsPlaying = false;
    let _spPrevPlaying = false; // for false\u2192true transition detection (auto-open)
    let _spAutoCloseTimer = null;

    const spBigArtWrap = document.getElementById("sp-big-art-wrap");
    const spBigTrack   = document.getElementById("sp-big-track");
    const spBigArtist  = document.getElementById("sp-big-artist");
    const spPlayPause  = document.getElementById("sp-play-pause");
    const spClose      = document.getElementById("sp-close");

    function _spEscAttr(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
    }

    function renderSpotify(data) {
      const wasPlaying = _spPrevPlaying;
      _spIsPlaying = !!(data && data.isPlaying);

      if (!_spIsPlaying) {
        // Music stopped \u2014 if the full card is open, fall back to time-of-day mode.
        if (document.body.getAttribute("data-mode") === "spotify") {
          closeSpotifyCard();
        }
        _spPrevPlaying = false;
        return;
      }

      // Populate the full card data (so it's instant when opened).
      if (spBigArtWrap) {
        if (data.albumArt) {
          spBigArtWrap.innerHTML = '<img class="sp-big-art" src="' + _spEscAttr(data.albumArt) + '" alt="" />';
        } else {
          spBigArtWrap.innerHTML = '<div class="sp-big-art-placeholder"><span>&#x266B;</span></div>';
        }
      }
      if (spBigTrack)  spBigTrack.textContent  = data.track  || "Unknown track";
      if (spBigArtist) spBigArtist.textContent = data.artist || "";
      if (spPlayPause) spPlayPause.textContent = data.isPlaying ? "\u23F8" : "\u25B6";

      // Auto-open the full player card on the false\u2192true transition (music just
      // started) \u2014 but only when the primary panel is in "todo" mode. Kids'
      // morning/evening routine checklists are load-bearing; music shouldn't
      // yank them. The user can still tap the green \u266b button to bring the
      // player up manually during routines.
      if (!wasPlaying) {
        const mode = document.body.getAttribute("data-mode");
        if (mode === "todo" || mode === null) {
          openSpotifyCard();
        }
      }
      _spPrevPlaying = true;
    }

    async function loadSpotify() {
      if (!SPOTIFY_PROXY_URL) return;
      try {
        const res = await fetch(SPOTIFY_PROXY_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        renderSpotify(await res.json());
      } catch (e) { /* silent fail */ }
    }

    function openSpotifyCard() {
      document.body.setAttribute("data-mode", "spotify");
      clearTimeout(_spAutoCloseTimer);
      _spAutoCloseTimer = setTimeout(closeSpotifyCard, 90 * 1000);
    }

    function closeSpotifyCard() {
      clearTimeout(_spAutoCloseTimer);
      // Recompute from time-of-day so a long-running player card returns to
      // the correct mode (e.g. opened at 14:55 todo, closes at 15:35 evening).
      try { updateMode(); } catch (_) { document.body.setAttribute("data-mode", "todo"); }
    }

    if (spClose) {
      spClose.addEventListener("click", closeSpotifyCard);
      spClose.addEventListener("touchend", function(e) { e.preventDefault(); closeSpotifyCard(); }, { passive: false });
    }

    function spCommand(cmd) {
      clearTimeout(_spAutoCloseTimer);
      _spAutoCloseTimer = setTimeout(closeSpotifyCard, 90 * 1000);
      window.location.href = "kiosk://spotify/" + cmd;
      // Spotify needs ~1s to reflect a state change; re-poll twice for snappier
      // toggle/track updates.
      setTimeout(loadSpotify, 800);
      setTimeout(loadSpotify, 2200);
    }

    const spPrevBtn = document.getElementById("sp-prev");
    const spNextBtn = document.getElementById("sp-next");
    if (spPrevBtn) {
      spPrevBtn.addEventListener("click", function() { spCommand("prev"); });
      spPrevBtn.addEventListener("touchend", function(e) { e.preventDefault(); spCommand("prev"); }, { passive: false });
    }
    if (spNextBtn) {
      spNextBtn.addEventListener("click", function() { spCommand("next"); });
      spNextBtn.addEventListener("touchend", function(e) { e.preventDefault(); spCommand("next"); }, { passive: false });
    }
    if (spPlayPause) {
      spPlayPause.addEventListener("click", function() { spCommand(_spIsPlaying ? "pause" : "play"); });
      spPlayPause.addEventListener("touchend", function(e) { e.preventDefault(); spCommand(_spIsPlaying ? "pause" : "play"); }, { passive: false });
    }

    // Spotify corner button \u2014 smart: if music is playing, open the dashboard's
    // full player card (re-entry after auto-close); otherwise launch the
    // Spotify APK on Terry so the user can pick something to play.
    (function() {
      const btn = document.getElementById("spotify-corner");
      if (!btn) return;
      function tap() {
        if (_spIsPlaying && document.body.getAttribute("data-mode") !== "spotify") {
          openSpotifyCard();
        } else {
          window.location.href = "kiosk://spotify/launch";
        }
      }
      btn.addEventListener("click", tap);
      btn.addEventListener("touchend", function(e) { e.preventDefault(); tap(); }, { passive: false });
    })();

    loadSpotify();
    // 10s polling \u2014 Vercel proxy caches 8s, so worst-case lag is ~10\u201318s. Was 30s.
    setInterval(loadSpotify, 10 * 1000);

    // ---------- Exit-to-Portal long-press (visible bottom-right button) ----------
    // 2-second hold fires kiosk://exit. MainActivity exits to Portal launcher.
    // Auto-return is now scheduled by the Activity's onStop hook (not here),
    // and the AutoReturnReceiver pauses if a call is active — so a long video
    // call won't get yanked out at 5 min.
    (function() {
      const btn = document.getElementById("exit-corner");
      if (!btn) return;
      const fill = btn.querySelector(".exit-fill");
      const HOLD_MS = 2000;
      let raf, startedAt;

      function tick() {
        const elapsed = performance.now() - startedAt;
        const pct = Math.min(100, (elapsed / HOLD_MS) * 100);
        if (fill) fill.style.background =
          `conic-gradient(var(--ochre) ${pct}%, transparent ${pct}%)`;
        if (pct >= 100) {
          stop();
          window.location.href = "kiosk://exit";
          return;
        }
        raf = requestAnimationFrame(tick);
      }
      function start(e) {
        if (e.cancelable) e.preventDefault();
        stop();
        btn.classList.add("holding");
        startedAt = performance.now();
        raf = requestAnimationFrame(tick);
      }
      function stop() {
        if (raf) cancelAnimationFrame(raf);
        raf = null;
        btn.classList.remove("holding");
        if (fill) fill.style.background = "conic-gradient(var(--ochre) 0%, transparent 0%)";
      }
      btn.addEventListener("touchstart",  start, { passive: false });
      btn.addEventListener("touchend",    stop,  { passive: true });
      btn.addEventListener("touchcancel", stop,  { passive: true });
      btn.addEventListener("mousedown",   start);
      btn.addEventListener("mouseup",     stop);
      btn.addEventListener("mouseleave",  stop);
    })();
  </script>
</body>
</html>
