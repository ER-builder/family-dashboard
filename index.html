<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Family Dashboard</title>
  <meta http-equiv="refresh" content="300" />
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #1a1040;
      --bg-3: #050816;
      --fg: #e7ecff;
      --fg-dim: #a3acd0;
      --accent: #8b5cf6;
      --accent-2: #38bdf8;
      --danger: #f87171;
      --glass: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(1200px 800px at 20% -10%, #2a1366 0%, transparent 60%),
                  radial-gradient(900px 700px at 110% 110%, #0a4f7a 0%, transparent 55%),
                  linear-gradient(135deg, var(--bg-3), var(--bg-1) 60%, var(--bg-2));
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: 0.01em;
    }
    .app {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 14px;
      height: 100vh;
    }
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .greet {
      display: flex;
      flex-direction: column;
    }
    .greet .hi {
      font-size: clamp(20px, 3.2vw, 32px);
      font-weight: 600;
    }
    .greet .date {
      color: var(--fg-dim);
      font-size: clamp(12px, 1.6vw, 15px);
      margin-top: 2px;
    }
    .clock {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: clamp(36px, 6vw, 64px);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .card {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }
    .card .body { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    /* Calendar */
    .calendar { grid-row: 2; grid-column: 1; }
    .calendar .body { gap: 4px; overflow-y: auto; min-height: 0; }
    .calendar .body::-webkit-scrollbar { width: 6px; }
    .calendar .body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .cal-day {
      margin-top: 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-2);
      padding: 6px 0 4px;
      border-bottom: 1px solid var(--border);
    }
    .cal-day:first-child { margin-top: 0; }
    .cal-day.today { color: var(--accent); }
    .cal-event {
      display: flex;
      gap: 12px;
      padding: 10px 4px;
      border-radius: 10px;
      align-items: flex-start;
    }
    .cal-event:hover { background: rgba(255,255,255,0.04); }
    .cal-event .when {
      flex-shrink: 0;
      width: 110px;
      font-size: 15px;
      color: var(--fg-dim);
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
    }
    .cal-event .what {
      flex: 1;
      min-width: 0;
    }
    .cal-event .title {
      font-size: 19px;
      font-weight: 500;
      color: var(--fg);
      line-height: 1.3;
      word-break: break-word;
    }
    .cal-event .loc {
      font-size: 12px;
      color: var(--fg-dim);
      margin-top: 2px;
    }
    .cal-event.allday .when { color: var(--accent); font-weight: 600; }
    .cal-empty, .cal-error {
      color: var(--fg-dim);
      text-align: center;
      padding: 30px 10px;
      font-size: 14px;
    }

    /* Right column stack */
    .right {
      grid-row: 2;
      grid-column: 2;
      display: grid;
      grid-template-rows: auto minmax(0, auto) minmax(220px, 1fr);
      gap: 14px;
      min-height: 0;
    }
    .routine { max-height: 42vh; }
    .routine .body { gap: 8px; min-height: 0; }
    .routine .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      overflow-y: auto;
      min-height: 0;
    }
    .routine .cols::-webkit-scrollbar { width: 6px; }
    .routine .cols::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .routine .kid h3 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 700;
      color: var(--fg);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .routine .kid h3 .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(139, 92, 246, 0.25);
      color: #c4b5fd;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .evening .kid h3 .badge {
      background: rgba(56, 189, 248, 0.20);
      color: #7dd3fc;
    }
    .routine .kid h3 .progress {
      margin-left: auto;
      font-size: 11px;
      color: var(--fg-dim);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .routine ul { list-style: none; margin: 0; padding: 0; }
    .routine li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      border-radius: 6px;
    }
    .routine li:hover { background: rgba(255,255,255,0.04); }
    .routine li input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--fg-dim);
      border-radius: 4px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      cursor: pointer;
      background: transparent;
    }
    .routine li input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
    }
    .routine li input[type="checkbox"]:checked::after {
      content: "✓";
      color: white;
      font-size: 11px;
      font-weight: 700;
    }
    .routine li.done { color: var(--fg-dim); text-decoration: line-through; }
    .routine li.optional { font-style: italic; color: var(--fg-dim); }

    /* Weather */
    .weather .row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .weather .temp {
      font-size: clamp(40px, 6vw, 60px);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .weather .meta { color: var(--fg-dim); font-size: 14px; }
    .weather .desc { font-size: 18px; text-transform: capitalize; }
    .weather .icon { font-size: 56px; line-height: 1; }
    .weather .hi-lo { display: flex; gap: 14px; margin-top: 6px; color: var(--fg-dim); font-size: 13px; }

    /* Todos */
    .todos .body { gap: 10px; }
    .todo-form {
      display: flex;
      gap: 8px;
    }
    .todo-form input {
      flex: 1;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }
    .todo-form input::placeholder { color: var(--fg-dim); }
    .todo-form input:focus { border-color: var(--accent); }
    .todo-form button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }
    .todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1;
    }
    .todo-list::-webkit-scrollbar { width: 6px; }
    .todo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .todo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 10px;
      border-radius: 12px;
      transition: background 120ms ease, opacity 200ms ease;
    }
    .todo.done { opacity: 0.55; }
    .todo:hover { background: rgba(255,255,255,0.04); }
    .todo input[type="checkbox"] {
      appearance: none;
      width: 26px;
      height: 26px;
      border: 2px solid var(--fg-dim);
      border-radius: 7px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: transparent;
    }
    .todo input[type="checkbox"]:checked {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
    }
    .todo input[type="checkbox"]:checked::after {
      content: "✓";
      color: white;
      font-size: 16px;
      font-weight: 700;
    }
    .todo .text {
      flex: 1;
      font-size: 18px;
      word-break: break-word;
      line-height: 1.3;
    }
    .todo.done .text {
      color: var(--fg-dim);
      text-decoration: line-through;
    }
    .todo .del {
      background: transparent;
      border: 0;
      color: var(--fg-dim);
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 120ms;
    }
    .todo:hover .del { opacity: 1; }
    .todo .del:hover { color: var(--danger); background: rgba(248,113,113,0.1); }
    .empty { color: var(--fg-dim); text-align: center; padding: 20px; font-size: 14px; }

    /* Portrait / smaller screens (Portal Mini ~8") */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr;
      }
      .calendar { grid-row: 2; grid-column: 1; min-height: 220px; }
      .right { grid-row: 3; grid-column: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="greet">
        <div class="hi" id="greeting">Hello</div>
        <div class="date" id="date">—</div>
      </div>
      <div class="clock" id="clock">--:--</div>
    </header>

    <section class="card calendar">
      <h2>Calendar</h2>
      <div class="body" id="cal-body">
        <div class="cal-empty">Loading…</div>
      </div>
    </section>

    <div class="right">
      <section class="card weather">
        <h2>London</h2>
        <div class="body">
          <div class="row">
            <div class="icon" id="w-icon">⛅</div>
            <div style="flex:1">
              <div class="temp" id="w-temp">—°</div>
              <div class="desc" id="w-desc">Loading…</div>
            </div>
          </div>
          <div class="hi-lo">
            <span id="w-hi">H —°</span>
            <span id="w-lo">L —°</span>
            <span id="w-feels">Feels —°</span>
          </div>
        </div>
      </section>

      <section class="card routine morning" id="morning-card" hidden>
        <h2>Morning Routine</h2>
        <div class="body">
          <div class="cols">
            <div class="kid" data-kid="eitan-morning">
              <h3>Eitan <span class="badge">AM</span><span class="progress" id="prog-eitan-morning"></span></h3>
              <ul></ul>
            </div>
            <div class="kid" data-kid="tamar-morning">
              <h3>Tamar <span class="badge">AM</span><span class="progress" id="prog-tamar-morning"></span></h3>
              <ul></ul>
            </div>
          </div>
        </div>
      </section>

      <section class="card routine evening" id="evening-card" hidden>
        <h2>Evening Routine</h2>
        <div class="body">
          <div class="cols">
            <div class="kid" data-kid="eitan-evening">
              <h3>Eitan <span class="badge">PM</span><span class="progress" id="prog-eitan-evening"></span></h3>
              <ul></ul>
            </div>
            <div class="kid" data-kid="tamar-evening">
              <h3>Tamar <span class="badge">PM</span><span class="progress" id="prog-tamar-evening"></span></h3>
              <ul></ul>
            </div>
          </div>
        </div>
      </section>

      <section class="card todos">
        <h2>Family To-Do</h2>
        <div class="body">
          <form class="todo-form" id="todo-form">
            <input id="todo-input" type="text" placeholder="Add a task…" maxlength="120" autocomplete="off" />
            <button type="submit">Add</button>
          </form>
          <ul class="todo-list" id="todo-list"></ul>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ---------- Config ----------
    const OPENWEATHER_API_KEY = "49fa7d892311cf0a36c08bbcf4204107";
    const CITY = "London,uk";
    const TZ = "Europe/London";

    // ---------- Clock + greeting ----------
    function tick() {
      const now = new Date();
      const time = new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
      }).format(now);
      document.getElementById("clock").textContent = time;

      const date = new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, weekday: "long", day: "numeric", month: "long", year: "numeric"
      }).format(now);
      document.getElementById("date").textContent = date;

      const hour = parseInt(new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, hour: "2-digit", hour12: false
      }).format(now), 10);
      let g = "Good evening";
      if (hour < 5) g = "Good night";
      else if (hour < 12) g = "Good morning";
      else if (hour < 18) g = "Good afternoon";
      document.getElementById("greeting").textContent = g + ", Rifman family";
    }
    tick();
    setInterval(tick, 1000);

    // ---------- To-Do (Google Sheets via Apps Script) ----------
    const TODO_API = "https://script.google.com/macros/s/AKfycbzWBQRARP92NhRkfEmSTfaaHkjQ3wh5RW1gD1YHdERwuxTyL83rQemuWPEZ6Im6Rdvt/exec";
    const listEl = document.getElementById("todo-list");
    const formEl = document.getElementById("todo-form");
    const inputEl = document.getElementById("todo-input");
    let todos = [];

    async function api(action, params = {}) {
      const url = new URL(TODO_API);
      url.searchParams.set("action", action);
      for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
      const res = await fetch(url.toString(), { cache: "no-store", redirect: "follow" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data;
    }

    async function refresh() {
      try {
        const data = await api("list");
        todos = data.todos || [];
        render();
      } catch (err) {
        renderError(err);
      }
    }

    function render() {
      listEl.innerHTML = "";
      if (!todos.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "No tasks yet — add one above.";
        listEl.appendChild(li);
        return;
      }
      // Sink checked items to the bottom; preserve relative order within each group.
      const sorted = [...todos].sort((a, b) => Number(!!a.done) - Number(!!b.done));
      sorted.forEach(t => {
        const li = document.createElement("li");
        li.className = "todo" + (t.done ? " done" : "");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!t.done;
        cb.addEventListener("change", async () => {
          // Optimistic flip
          const item = todos.find(x => x.id === t.id);
          if (item) item.done = cb.checked;
          render();
          try { await api("toggle", { id: t.id }); }
          catch (err) { refresh(); }
        });
        const span = document.createElement("span");
        span.className = "text";
        span.textContent = t.text;
        const del = document.createElement("button");
        del.className = "del";
        del.type = "button";
        del.title = "Delete";
        del.textContent = "✕";
        del.addEventListener("click", async () => {
          // Optimistic remove
          todos = todos.filter(x => x.id !== t.id);
          render();
          try { await api("delete", { id: t.id }); }
          catch (err) { refresh(); }
        });
        li.append(cb, span, del);
        listEl.appendChild(li);
      });
    }

    function renderError(err) {
      listEl.innerHTML = "";
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "Can't reach to-do list — retrying…";
      listEl.appendChild(li);
    }

    formEl.addEventListener("submit", async e => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      // Optimistic insert with temp id
      const temp = { id: "tmp:" + Date.now(), text, done: false };
      todos.unshift(temp);
      render();
      try {
        const data = await api("add", { text });
        if (data.todo) {
          // Swap temp for server item
          const idx = todos.findIndex(x => x.id === temp.id);
          if (idx >= 0) todos[idx] = data.todo;
          render();
        }
      } catch (err) {
        // Roll back temp item, refetch
        todos = todos.filter(x => x.id !== temp.id);
        refresh();
      }
    });

    refresh();
    setInterval(refresh, 60 * 1000); // poll for changes from phones every 60s

    // ---------- Weather ----------
    const ICONS = {
      "01": "☀️", "02": "🌤️", "03": "⛅", "04": "☁️",
      "09": "🌧️", "10": "🌦️", "11": "⛈️", "13": "❄️", "50": "🌫️"
    };
    async function loadWeather() {
      if (!OPENWEATHER_API_KEY || OPENWEATHER_API_KEY === "YOUR_API_KEY") {
        document.getElementById("w-desc").textContent = "Add OpenWeather API key";
        return;
      }
      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(CITY)}&appid=${OPENWEATHER_API_KEY}&units=metric`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const d = await res.json();
        const code = (d.weather?.[0]?.icon || "01d").slice(0, 2);
        document.getElementById("w-icon").textContent = ICONS[code] || "🌡️";
        document.getElementById("w-temp").textContent = Math.round(d.main.temp) + "°";
        document.getElementById("w-desc").textContent = d.weather?.[0]?.description || "";
        document.getElementById("w-hi").textContent = "H " + Math.round(d.main.temp_max) + "°";
        document.getElementById("w-lo").textContent = "L " + Math.round(d.main.temp_min) + "°";
        document.getElementById("w-feels").textContent = "Feels " + Math.round(d.main.feels_like) + "°";
      } catch (err) {
        document.getElementById("w-desc").textContent = "Weather unavailable";
      }
    }
    // ---------- Routines (per-kid, daily reset, time-windowed) ----------
    const ROUTINES = {
      morning: {
        "eitan-morning": ["Breakfast","Get Dressed","Brush Teeth","Socks and Shoes","Vitamin","Water Bottle","Pack a Snack","Pack Your Bag","Free Time / TV :)"],
        "tamar-morning": ["Breakfast","Get Dressed","Brush Teeth","Socks and Shoes","Hair","Water Bottle","Pack a Snack","Pack Your Bag","Free Time / TV :)"]
      },
      evening: {
        "eitan-evening": ["Homework","(Optional) TV / Games","Dinner Prep","Dinner","House Chores","(Optional) Dessert","Shower","PJ","Brush Teeth","Reading Time (in bed)"],
        "tamar-evening": ["Homework","(Optional) TV / Games","Dinner Prep","Dinner","House Chores","(Optional) Dessert","Shower","PJ","Brush Teeth","Reading Time (in bed)"]
      }
    };
    function todayKey() {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
    }
    function routineStorageKey(kid) { return `routine:${todayKey()}:${kid}`; }
    function loadRoutine(kid) {
      try { return new Set(JSON.parse(localStorage.getItem(routineStorageKey(kid))) || []); }
      catch { return new Set(); }
    }
    function saveRoutine(kid, set) {
      localStorage.setItem(routineStorageKey(kid), JSON.stringify([...set]));
    }
    function pruneOldRoutines() {
      const today = todayKey();
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && (k.startsWith("routine:") || k.startsWith("morning:")) && !k.includes(`:${today}:`)) {
          localStorage.removeItem(k);
        }
      }
    }
    function renderRoutines() {
      pruneOldRoutines();
      const all = { ...ROUTINES.morning, ...ROUTINES.evening };
      Object.entries(all).forEach(([kid, items]) => {
        const ul = document.querySelector(`.kid[data-kid="${kid}"] ul`);
        if (!ul) return;
        const checked = loadRoutine(kid);
        ul.innerHTML = "";
        items.forEach((label, idx) => {
          const li = document.createElement("li");
          if (checked.has(idx)) li.classList.add("done");
          if (label.startsWith("(Optional")) li.classList.add("optional");
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = checked.has(idx);
          cb.addEventListener("change", () => {
            const set = loadRoutine(kid);
            if (cb.checked) set.add(idx); else set.delete(idx);
            saveRoutine(kid, set);
            renderRoutines();
          });
          const span = document.createElement("span");
          span.textContent = label;
          li.append(cb, span);
          li.addEventListener("click", e => { if (e.target.tagName !== "INPUT") cb.click(); });
          ul.appendChild(li);
        });
        const prog = document.getElementById(`prog-${kid}`);
        if (prog) prog.textContent = `${checked.size}/${items.length}`;
      });
    }
    function nowMinutesLondon() {
      // Use toLocaleTimeString which is widely supported on old WebViews
      // (formatToParts can fail or be unimplemented on older Chromium).
      try {
        const s = new Date().toLocaleTimeString("en-GB", {
          timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
        });
        const m = s.match(/(\d{1,2}):(\d{2})/);
        if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      } catch (e) {}
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }
    function updateRoutineVisibility() {
      const mins = nowMinutesLondon();
      const showMorning = mins >= 6 * 60 && mins < 9 * 60;            // 06:00–08:59
      const showEvening = mins >= 15 * 60 + 30 && mins < 20 * 60 + 30; // 15:30–20:29
      document.getElementById("morning-card").hidden = !showMorning;
      document.getElementById("evening-card").hidden = !showEvening;
    }
    renderRoutines();
    updateRoutineVisibility();
    setInterval(() => { renderRoutines(); updateRoutineVisibility(); }, 60 * 1000);

    loadWeather();
    setInterval(loadWeather, 15 * 60 * 1000); // every 15 min

    // ---------- Calendar (via Vercel proxy) ----------
    const CAL_PROXY_URL = "https://family-dashboard-proxy.vercel.app/api/cal";
    const calBody = document.getElementById("cal-body");

    function dayKey(d) {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(d);
    }
    function dayLabel(d) {
      const today = dayKey(new Date());
      const tomorrow = dayKey(new Date(Date.now() + 86400000));
      const k = dayKey(d);
      const human = new Intl.DateTimeFormat("en-GB", { timeZone: TZ, weekday: "long", day: "numeric", month: "short" }).format(d);
      if (k === today) return { label: "Today · " + human, today: true };
      if (k === tomorrow) return { label: "Tomorrow · " + human, today: false };
      return { label: human, today: false };
    }
    function fmtTime(d) {
      return new Intl.DateTimeFormat("en-GB", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false }).format(d);
    }
    async function loadCalendar() {
      try {
        const res = await fetch(CAL_PROXY_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const { events } = await res.json();
        renderCalendar(events || []);
      } catch (err) {
        calBody.innerHTML = `<div class="cal-error">Calendar unavailable<br><small>${err.message || err}</small></div>`;
      }
    }
    function renderCalendar(events) {
      if (!events.length) {
        calBody.innerHTML = `<div class="cal-empty">No upcoming events.</div>`;
        return;
      }
      // Group by day key.
      const groups = new Map();
      for (const ev of events) {
        const start = new Date(ev.start);
        const k = dayKey(start);
        if (!groups.has(k)) groups.set(k, { date: start, items: [] });
        groups.get(k).items.push(ev);
      }
      const html = [];
      for (const [, g] of groups) {
        const lbl = dayLabel(g.date);
        html.push(`<div class="cal-day ${lbl.today ? "today" : ""}">${escapeHtml(lbl.label)}</div>`);
        for (const ev of g.items) {
          const start = new Date(ev.start);
          const end = new Date(ev.end);
          const when = ev.allDay ? "All day" : `${fmtTime(start)}–${fmtTime(end)}`;
          html.push(`
            <div class="cal-event ${ev.allDay ? "allday" : ""}">
              <div class="when">${escapeHtml(when)}</div>
              <div class="what">
                <div class="title">${escapeHtml(ev.title)}</div>
                ${ev.location ? `<div class="loc">${escapeHtml(ev.location)}</div>` : ""}
              </div>
            </div>`);
        }
      }
      calBody.innerHTML = html.join("");
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
    }
    loadCalendar();
    setInterval(loadCalendar, 5 * 60 * 1000); // every 5 min
  </script>
</body>
</html>
