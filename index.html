<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Rifman Almanac</title>
  <meta http-equiv="refresh" content="300" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,500;1,9..144,600&family=Public+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&family=Frank+Ruhl+Libre:wght@400;500;700&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* warm cream text on deep aubergine night */
      --ink:        #f3e7cf;
      --ink-soft:   #c7b89e;
      --ink-dim:    #8a7d62;
      --ink-faint:  #58503f;

      --paper:      #14101a;   /* deepest bg */
      --paper-2:    #1f1925;   /* card */
      --paper-3:    #2a2230;   /* raised */

      /* print-mag accents (deliberately muted, not neon) */
      --ochre:      #e9b44c;
      --ochre-soft: rgba(233, 180, 76, 0.14);
      --terracotta: #c8553d;
      --terracotta-soft: rgba(200, 85, 61, 0.13);
      --sage:       #6ba883;
      --sage-soft:  rgba(107, 168, 131, 0.12);
      --cobalt:     #6e95c8;
      --cobalt-soft: rgba(110, 149, 200, 0.13);
      --lavender:   #b4a6c9;
      --lavender-soft: rgba(180, 166, 201, 0.13);

      --rule:        rgba(243, 231, 207, 0.10);
      --rule-strong: rgba(243, 231, 207, 0.22);

      --serif: "Fraunces", "Heebo", "Frank Ruhl Libre", Georgia, "Times New Roman", serif;
      --sans:  "Public Sans", "Heebo", "Frank Ruhl Libre", system-ui, -apple-system, "Segoe UI", sans-serif;
      --mono:  "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 400;
      letter-spacing: 0.005em;
      -webkit-font-smoothing: antialiased;
      background:
        /* warm pendant-light spotlight, top-left */
        radial-gradient(ellipse 90% 70% at 18% -8%, rgba(233, 180, 76, 0.18) 0%, transparent 55%),
        /* gentle warm glow, bottom-right corner */
        radial-gradient(ellipse 70% 90% at 112% 112%, rgba(200, 85, 61, 0.10) 0%, transparent 55%),
        /* base midnight gradient */
        linear-gradient(180deg, #110d16 0%, #181219 55%, #110d16 100%);
    }

    /* paper grain overlay — subtle, like newsprint */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.91  0 0 0 0 0.81  0 0 0 0.07 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.1fr);
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      padding: 18px 22px;
      height: 100vh;
    }

    /* ─────────────────────────────────────────
       MASTHEAD — newspaper-style header
       ───────────────────────────────────────── */
    .masthead {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 28px;
      padding: 6px 4px 16px;
      border-bottom: 1px solid var(--rule-strong);
      position: relative;
    }
    .masthead::after {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: -3px;
      height: 1px;
      background: var(--rule);
    }
    .marque { display: flex; flex-direction: column; }
    .greeting {
      font-family: var(--serif);
      font-variation-settings: "opsz" 96;
      font-size: clamp(30px, 3.7vw, 44px);
      font-weight: 600;
      line-height: 1.05;
      color: var(--ink);
      margin-top: 0;
      letter-spacing: -0.005em;
    }
    .date {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(13px, 1.4vw, 16px);
      color: var(--ink-soft);
      margin-top: 6px;
      letter-spacing: 0.01em;
    }
    .worldclock {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-dim);
      margin-top: 6px;
      letter-spacing: 0.06em;
      font-feature-settings: "tnum" 1;
    }
    .worldclock .city {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 0 6px 0 4px;
    }
    .clock {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144, "wght" 500;
      font-weight: 500;
      font-size: clamp(64px, 9.5vw, 118px);
      line-height: 0.82;
      color: var(--ink);
      letter-spacing: -0.025em;
      font-feature-settings: "tnum" 1, "lnum" 1;
      text-shadow: 0 2px 24px rgba(233, 180, 76, 0.08);
    }

    /* ─────────────────────────────────────────
       CARDS — base
       ───────────────────────────────────────── */
    .card {
      background: var(--paper-2);
      border-radius: 18px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--rule);
      box-shadow:
        inset 0 1px 0 rgba(243, 231, 207, 0.04),
        0 18px 44px -20px rgba(0, 0, 0, 0.65);
      position: relative;
    }

    /* Eyebrow label inside cards (NOT to collide with .label class set by JS on routine items) */
    .eyebrow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .eyebrow .glyph {
      color: var(--ochre);
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0;
      line-height: 1;
    }
    .eyebrow .name {
      color: var(--ink-soft);
    }
    .eyebrow .rule {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .eyebrow .meta {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--ink-dim);
      font-weight: 400;
    }

    .card .body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ─────────────────────────────────────────
       CALENDAR — Google-Cal-style day view
       ───────────────────────────────────────── */
    .calendar { grid-row: 2; grid-column: 1; --hour-h: 28px; }
    .calendar .body {
      gap: 0;
      overflow-y: auto;
      position: relative;
    }
    .calendar .body::-webkit-scrollbar { width: 5px; }
    .calendar .body::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 3px; }

    /* All-day chips strip (today only) */
    .cal-allday {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .cal-allday:empty { display: none; }
    .cal-allday .chip {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      color: var(--terracotta);
      background: var(--terracotta-soft);
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    /* Today timeline (06:00–22:00 = 17 hour rules) */
    .cal-today {
      position: relative;
      height: calc(var(--hour-h) * 17);
      margin: 4px 0 14px;
    }
    .cal-today .hour-mark {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--rule);
    }
    .cal-today .hour-mark .h-label {
      position: absolute;
      left: 0;
      top: -7px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-dim);
      background: var(--paper-2);
      padding-right: 8px;
      letter-spacing: 0.06em;
    }
    .cal-block {
      position: absolute;
      left: 38px;
      right: 6px;
      background: var(--cobalt-soft);
      border-left: 3px solid var(--cobalt);
      border-radius: 6px;
      padding: 3px 10px;
      overflow: hidden;
      box-shadow: 0 4px 12px -8px rgba(0, 0, 0, 0.4);
    }
    .cal-block.past { opacity: 0.42; }
    .cal-block .title {
      font-family: var(--serif);
      font-variation-settings: "opsz" 96;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.18;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      letter-spacing: -0.005em;
    }
    .cal-block .when {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-soft);
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.02em;
      margin-top: 1px;
    }
    .cal-now {
      position: absolute;
      left: 30px;
      right: 0;
      height: 2px;
      background: var(--terracotta);
      z-index: 5;
      box-shadow: 0 0 12px rgba(200, 85, 61, 0.45);
      pointer-events: none;
    }
    .cal-now::before {
      content: "";
      position: absolute;
      left: -6px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--terracotta);
      box-shadow: 0 0 8px rgba(200, 85, 61, 0.7);
    }

    /* Future days — compact list below today's timeline */
    .cal-future {
      border-top: 1px dashed var(--rule);
      padding-top: 12px;
    }
    .cal-future:empty { border-top: 0; padding-top: 0; }
    .cal-future .day-head {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 14px;
      color: var(--ochre);
      margin-top: 10px;
      letter-spacing: 0.005em;
    }
    .cal-future .day-head:first-child { margin-top: 0; }
    .cal-future .row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 10px;
      padding: 5px 0 5px 4px;
      align-items: baseline;
    }
    .cal-future .row .t {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.02em;
    }
    .cal-future .row .ti {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.003em;
      line-height: 1.2;
    }

    .cal-empty, .cal-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      text-align: center;
      padding: 18px;
      color: var(--ink-soft);
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
    }
    .cal-empty::before, .cal-error::before {
      content: "✦";
      display: block;
      font-family: var(--serif);
      font-size: 28px;
      color: var(--ochre);
      opacity: 0.55;
      margin-bottom: 8px;
      line-height: 1;
      font-style: normal;
    }
    .cal-error { color: var(--terracotta); }
    .cal-error::before { color: var(--terracotta); content: "❡"; }
    .cal-error small {
      display: block;
      margin-top: 6px;
      font-family: var(--mono);
      font-style: normal;
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--ink-dim);
    }

    /* ─────────────────────────────────────────
       RIGHT COLUMN — flex stack
       ───────────────────────────────────────── */
    .right {
      grid-row: 2;
      grid-column: 2;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
    }

    /* ─────────────────────────────────────────
       WEATHER — atmospheric card
       ───────────────────────────────────────── */
    .weather {
      flex-shrink: 0;
      background:
        radial-gradient(ellipse 90% 70% at 85% 0%, rgba(233, 180, 76, 0.20) 0%, transparent 60%),
        linear-gradient(155deg, #2c2336 0%, #1f1828 100%);
      overflow: hidden;
    }
    .weather::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 88% 22%, rgba(233, 180, 76, 0.18), transparent 32%);
      pointer-events: none;
    }
    .weather .body { gap: 16px; }
    .weather .top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: center;
      position: relative;
    }
    .weather .icon {
      font-size: 60px;
      line-height: 1;
      filter: drop-shadow(0 4px 14px rgba(233, 180, 76, 0.40));
    }
    .weather .temp {
      font-family: var(--serif);
      font-variation-settings: "opsz" 144, "wght" 400;
      font-weight: 400;
      font-size: clamp(54px, 6.5vw, 72px);
      line-height: 0.92;
      color: var(--ink);
      font-feature-settings: "tnum" 1, "lnum" 1;
      letter-spacing: -0.025em;
    }
    .weather .desc {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 17px;
      color: var(--ink-soft);
      text-transform: lowercase;
      margin-top: 4px;
      letter-spacing: 0.005em;
    }
    .weather .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--rule);
      font-family: var(--mono);
      font-size: 14px;
      color: var(--ink);
      font-feature-settings: "tnum" 1;
      position: relative;
    }
    .weather .stats span {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .weather .stats span::before {
      content: attr(data-label);
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-dim);
      font-weight: 700;
    }
    .weather .hourly {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      padding-top: 12px;
      border-top: 1px dashed var(--rule);
      position: relative;
    }
    .weather .hourly .h {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .weather .hourly .h .when {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--ink-dim);
      font-weight: 700;
      text-transform: uppercase;
    }
    .weather .hourly .h .icon {
      font-size: 18px;
      line-height: 1;
      filter: drop-shadow(0 2px 6px rgba(233, 180, 76, 0.25));
    }
    .weather .hourly .h .t {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink);
      font-feature-settings: "tnum" 1;
    }
    .weather .hourly .h.rain .t { color: var(--cobalt); }

    /* ─────────────────────────────────────────
       TRANSIT — Northern Line + Bus 102
       ───────────────────────────────────────── */
    .transit { flex-shrink: 0; }
    .transit .body { gap: 6px; }
    .transit .line-row {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 8px 4px;
      border-bottom: 1px solid var(--rule);
    }
    .transit .line-row:last-child { border-bottom: 0; }
    .transit .badge {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 800;
      border-radius: 6px;
      padding: 5px 0;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .transit .line-name {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.003em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .transit .status {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .transit .status.good   { background: var(--sage-soft);       color: var(--sage); }
    .transit .status.minor  { background: var(--ochre-soft);      color: var(--ochre); }
    .transit .status.severe { background: var(--terracotta-soft); color: var(--terracotta); }

    /* ─────────────────────────────────────────
       ROUTINE CARDS — library card style
       ───────────────────────────────────────── */
    .routine {
      flex-shrink: 0;
      max-height: 50vh;
      padding: 0;
      overflow: hidden;
    }
    .topstripe {
      height: 8px;
      display: flex;
    }
    .topstripe i {
      flex: 1;
      display: block;
    }
    .morning .topstripe i:nth-child(1) { background: var(--cobalt); }
    .morning .topstripe i:nth-child(2) { background: var(--terracotta); }
    .evening .topstripe i:nth-child(1) { background: var(--lavender); }
    .evening .topstripe i:nth-child(2) { background: var(--ochre); }
    .topstripe::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 8px;
      height: 1px;
      background: rgba(20, 16, 26, 0.6);
    }

    .routine .inner {
      padding: 16px 20px 18px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
      position: relative;
    }
    .routine .body { gap: 14px; min-height: 0; }
    .routine .cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      overflow-y: auto;
      min-height: 0;
    }
    .routine .cols::-webkit-scrollbar { width: 5px; }
    .routine .cols::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 3px; }

    .routine .kid {
      --kid: var(--ochre);
      --kid-soft: var(--ochre-soft);
      padding: 14px 12px 14px;
      border-radius: 13px;
      background: var(--kid-soft);
      border: 1px solid rgba(243, 231, 207, 0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .routine .kid[data-kid^="eitan"] { --kid: var(--cobalt);     --kid-soft: var(--cobalt-soft); }
    .routine .kid[data-kid^="tamar"] { --kid: var(--terracotta); --kid-soft: var(--terracotta-soft); }

    .routine .kid h3 {
      margin: 0;
      font-family: var(--serif);
      font-variation-settings: "opsz" 96;
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 8px;
      letter-spacing: -0.005em;
    }
    .routine .kid h3 .badge {
      font-size: 18px;
      line-height: 1;
    }
    .routine .kid h3 .progress {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
      font-weight: 400;
      font-feature-settings: "tnum" 1;
      letter-spacing: 0.05em;
    }

    .routine .progress-bar {
      height: 4px;
      border-radius: 999px;
      background: rgba(243, 231, 207, 0.07);
      overflow: hidden;
      margin: -2px 0 4px;
    }
    .routine .progress-bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--kid);
      border-radius: 999px;
      transition: width 350ms cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 12px var(--kid);
    }

    .routine ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .routine li {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 6px;
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      border-radius: 9px;
      min-height: 44px;
      transition: background 140ms ease, transform 100ms ease;
      color: var(--ink);
      border: 0;
    }
    .routine li:hover { background: rgba(243, 231, 207, 0.05); }
    .routine li:active { transform: scale(0.98); }
    .routine li .icon {
      font-size: 19px;
      line-height: 1;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }
    /* The JS sets .label class on the text span inside each routine item. */
    .routine li .label {
      flex: 1;
      min-width: 0;
      line-height: 1.25;
    }
    .routine li input[type="checkbox"] {
      appearance: none;
      width: 28px;
      height: 28px;
      border: 2px solid rgba(243, 231, 207, 0.32);
      border-radius: 8px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      cursor: pointer;
      background: transparent;
      transition:
        transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1),
        background 160ms ease,
        border-color 160ms ease;
    }
    .routine li input[type="checkbox"]:checked {
      background: var(--kid);
      border-color: transparent;
      transform: scale(1.08) rotate(-3deg);
    }
    .routine li input[type="checkbox"]:checked::after {
      content: "✓";
      color: var(--paper);
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
    }
    .routine li.done .label { color: var(--ink-dim); text-decoration: line-through; text-decoration-thickness: 1.5px; }
    .routine li.done .icon { filter: grayscale(0.7); opacity: 0.45; }
    .routine li.optional .label { font-style: italic; color: var(--ink-soft); }
    .routine li.optional::after {
      content: "opt";
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-dim);
      padding: 2px 6px;
      border: 1px solid var(--rule);
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────
       TO-DO — notebook page
       ───────────────────────────────────────── */
    .todos {
      flex: 1;
      min-height: 0;
      background: var(--paper-2);
    }
    .todos .body { gap: 14px; position: relative; }

    .todo-form {
      display: flex;
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
    }
    .todo-form input {
      flex: 1;
      background: transparent;
      border: 0;
      color: var(--ink);
      padding: 10px 4px;
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 19px;
      outline: none;
      min-height: 48px;
      letter-spacing: 0.005em;
    }
    .todo-form input::placeholder {
      color: var(--ink-dim);
      font-style: italic;
    }
    .todo-form button {
      background: var(--ochre);
      color: var(--paper);
      border: 0;
      border-radius: 10px;
      padding: 0 22px;
      font-family: var(--sans);
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      min-height: 48px;
      min-width: 88px;
      transition: transform 100ms ease, background 160ms ease, box-shadow 200ms ease;
      box-shadow: 0 8px 20px -8px rgba(233, 180, 76, 0.5);
    }
    .todo-form button:hover { background: #f0c060; }
    .todo-form button:active { transform: scale(0.96) translateY(1px); box-shadow: 0 4px 12px -6px rgba(233, 180, 76, 0.5); }

    .todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1;
    }
    .todo-list::-webkit-scrollbar { width: 5px; }
    .todo-list::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 3px; }

    .todo {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 6px;
      transition: opacity 250ms ease, background 140ms ease;
      min-height: 42px;
      border-bottom: 1px solid var(--rule);
    }
    .todo:last-child { border-bottom: 0; }
    .todo:hover { background: rgba(243, 231, 207, 0.025); border-radius: 6px; }
    .todo.fading {
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 350ms ease, transform 350ms ease;
    }
    .todo.done { opacity: 0.42; }
    .todo input[type="checkbox"] {
      appearance: none;
      width: 26px;
      height: 26px;
      border: 2px solid var(--ink-soft);
      border-radius: 7px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: transparent;
      transition:
        transform 220ms cubic-bezier(0.34, 1.56, 0.64, 1),
        background 160ms ease,
        border-color 160ms ease;
    }
    .todo input[type="checkbox"]:checked {
      background: var(--ochre);
      border-color: transparent;
      transform: scale(1.08) rotate(-3deg);
    }
    .todo input[type="checkbox"]:checked::after {
      content: "✓";
      color: var(--paper);
      font-size: 16px;
      font-weight: 800;
    }
    .todo .text {
      flex: 1;
      font-family: var(--serif);
      font-variation-settings: "opsz" 144;
      font-size: 20px;
      font-weight: 400;
      word-break: break-word;
      line-height: 1.25;
      color: var(--ink);
      letter-spacing: -0.003em;
    }
    .todo.done .text {
      color: var(--ink-soft);
      text-decoration: line-through;
      text-decoration-thickness: 1.5px;
    }
    .todo .del {
      background: transparent;
      border: 0;
      color: var(--ink-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 120ms, color 120ms, background 120ms;
    }
    .todo:hover .del { opacity: 0.75; }
    .todo .del:hover { color: var(--terracotta); background: rgba(200, 85, 61, 0.12); }

    .empty {
      font-family: var(--serif);
      font-style: italic;
      color: var(--ink-soft);
      text-align: center;
      padding: 36px 16px;
      font-size: 17px;
      letter-spacing: 0.01em;
    }
    .empty::before {
      content: "✎";
      display: block;
      font-family: var(--serif);
      font-style: normal;
      font-size: 36px;
      color: var(--ink-faint);
      margin-bottom: 12px;
      line-height: 1;
    }

    /* ─────────────────────────────────────────
       Page entrance
       ───────────────────────────────────────── */
    .masthead { animation: fadeDown 700ms cubic-bezier(0.16, 1, 0.3, 1) both; }
    .card     { animation: rise 700ms cubic-bezier(0.16, 1, 0.3, 1) both; }
    .calendar { animation-delay: 80ms; }
    .weather  { animation-delay: 140ms; }
    .routine  { animation-delay: 200ms; }
    .todos    { animation-delay: 260ms; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: none; }
    }

    /* ─────────────────────────────────────────
       CELEBRATION — fires when a kid finishes morning routine
       ───────────────────────────────────────── */
    .celebration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10000;
      overflow: hidden;
    }
    .celebration .toast {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%) scale(1);
      font-family: var(--serif);
      font-size: clamp(36px, 5.4vw, 64px);
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      background:
        radial-gradient(ellipse 70% 90% at 50% 0%, rgba(233, 180, 76, 0.20) 0%, transparent 60%),
        var(--paper-2);
      border: 1px solid var(--rule-strong);
      border-radius: 22px;
      padding: 36px 56px;
      box-shadow: 0 24px 80px -20px rgba(0, 0, 0, 0.75);
      animation: celebPop 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
      letter-spacing: -0.01em;
    }
    .celebration .toast .name {
      display: block;
      margin-top: 8px;
      font-family: var(--serif);
      font-size: 0.62em;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .celebration.fading .toast {
      animation: celebFade 600ms cubic-bezier(0.4, 0, 0.6, 1) both;
    }
    .celebration .confetti {
      position: absolute;
      top: -40px;
      animation: confettiFall linear forwards;
      will-change: transform;
      user-select: none;
    }
    @keyframes celebPop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes celebFade {
      to { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
    }
    @keyframes confettiFall {
      from { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      8%   { opacity: 1; }
      to   { transform: translateY(110vh) rotate(720deg); opacity: 0.6; }
    }
    .kid.celebrating h3 {
      animation: namePulse 1200ms ease-out both;
    }
    @keyframes namePulse {
      0%, 100% { transform: scale(1); }
      40%      { transform: scale(1.08); }
    }

    /* Daily quote — fixed bottom-center, low contrast */
    .daily-quote {
      position: fixed;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--serif);
      font-style: italic;
      font-size: 12px;
      color: rgba(243, 231, 207, 0.32);
      letter-spacing: 0.015em;
      pointer-events: none;
      text-align: center;
      max-width: 56vw;
      z-index: 50;
      line-height: 1.3;
    }
    .daily-quote::before { content: "\201C"; margin-right: 2px; }
    .daily-quote::after  { content: "\201D"; margin-left: 2px; }

    /* Smaller screens — Portal Mini portrait */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 14px;
        gap: 14px;
      }
      .calendar { grid-row: 2; grid-column: 1; min-height: 240px; }
      .right    { grid-row: 3; grid-column: 1; }
    }
  </style>
</head>
<body>
  <span id="dbg" style="position:fixed;bottom:5px;left:8px;font-family:monospace;font-size:9px;color:rgba(243,231,207,0.22);pointer-events:none;z-index:9999;letter-spacing:0.05em"></span>
  <div id="daily-quote" class="daily-quote"></div>
  <!-- 2-second long-press in bottom-right corner → fires kiosk://exit URL,
       intercepted by MainActivity's shouldOverrideUrlLoading → finishAndRemoveTask() -->
  <button id="exit-corner" aria-label="Exit kiosk" style="position:fixed;bottom:0;right:0;width:72px;height:72px;background:transparent;border:none;cursor:pointer;z-index:9999;-webkit-tap-highlight-color:transparent;touch-action:none"></button>

  <div class="app">
    <header class="masthead">

        <div class="body">
          <form class="todo-form" id="todo-form">
            <input id="todo-input" type="text" placeholder="add a note…" maxlength="120" autocomplete="off" />
            <button type="submit">Add</button>

  <script>
    // ---------- Config ----------
    const OPENWEATHER_API_KEY = "49fa7d892311cf0a36c08bbcf4204107";
    const CITY = "London,uk";
    const TZ = "Europe/London";

    // ---------- Clock + greeting ----------
    function tick() {
      const now = new Date();
      const time = new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
      }).format(now);
      document.getElementById("clock").textContent = time;

      const date = new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, weekday: "long", day: "numeric", month: "long", year: "numeric"
      }).format(now);
      document.getElementById("date").textContent = date;

      const hour = parseInt(new Intl.DateTimeFormat("en-GB", {
        timeZone: TZ, hour: "2-digit", hour12: false
      }).format(now), 10);
      let g = "Good evening";
      if (hour < 5) g = "Good night";
      else if (hour < 12) g = "Good morning";
      else if (hour < 18) g = "Good afternoon";
      document.getElementById("greeting").textContent = g + ", Rifman family";

      // World clock — family in TLV
      const tlv = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Jerusalem", hour: "2-digit", minute: "2-digit", hour12: false
      }).format(now);
      const wc = document.getElementById("worldclock");
      if (wc) {
        wc.textContent = "";
        wc.appendChild(document.createTextNode("🇮🇱"));
        const cityEl = document.createElement("span");
        cityEl.className = "city";
        cityEl.textContent = "Tel Aviv";
        wc.appendChild(cityEl);
        wc.appendChild(document.createTextNode(tlv));
      }
    }
    tick();
    setInterval(tick, 1000);

    // ---------- To-Do (Google Sheets via Apps Script) ----------
    const TODO_API = "https://script.google.com/macros/s/AKfycbzWBQRARP92NhRkfEmSTfaaHkjQ3wh5RW1gD1YHdERwuxTyL83rQemuWPEZ6Im6Rdvt/exec";
    const TODO_FADE_MS = 15000;
    const listEl = document.getElementById("todo-list");
    const formEl = document.getElementById("todo-form");
    const inputEl = document.getElementById("todo-input");
    let todos = [];
    const todoFadeTimers = new Map(); // id → setTimeout handle (pending auto-delete)

    async function api(action, params = {}) {
      const url = new URL(TODO_API);
      url.searchParams.set("action", action);
      for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
      const res = await fetch(url.toString(), { cache: "no-store", redirect: "follow" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      return data;
    }

    // Schedule a checked todo to fade out + delete in 15s.
    // If the user un-checks within the window, the toggle handler clears this timer.
    function scheduleAutoDelete(id) {
      const handle = setTimeout(async () => {
        todoFadeTimers.delete(id);
        // Re-check still done (user may have flipped back without us catching it)
        const item = todos.find(x => x.id === id);
        if (!item || !item.done) return;
        const li = listEl.querySelector(`[data-todo-id="${CSS.escape(String(id))}"]`);
        if (li) {
          li.classList.add("fading");
          setTimeout(() => finishDelete(id), 350);
        } else {
          finishDelete(id);
        }
      }, TODO_FADE_MS);
      todoFadeTimers.set(id, handle);
    }
    async function finishDelete(id) {
      todos = todos.filter(x => x.id !== id);
      render();
      try { await api("delete", { id }); }
      catch (err) { refresh(); }
    }

    async function refresh() {
      try {
        const data = await api("list");
        todos = data.todos || [];
        render();
      } catch (err) {
        renderError(err);
      }
    }

    function render() {
      listEl.innerHTML = "";
      if (!todos.length) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "Nothing to write down yet.";
        listEl.appendChild(li);
        return;
      }
      // Sink checked items to the bottom; preserve relative order within each group.
      const sorted = [...todos].sort((a, b) => Number(!!a.done) - Number(!!b.done));
      sorted.forEach(t => {
        const li = document.createElement("li");
        li.className = "todo" + (t.done ? " done" : "");
        li.dataset.todoId = t.id;
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!t.done;
        cb.addEventListener("change", async () => {
          // Optimistic flip
          const item = todos.find(x => x.id === t.id);
          if (item) item.done = cb.checked;
          // Cancel any pending auto-delete for this item
          if (todoFadeTimers.has(t.id)) {
            clearTimeout(todoFadeTimers.get(t.id));
            todoFadeTimers.delete(t.id);
          }
          // If now checked, schedule auto-delete after 15s
          if (cb.checked) scheduleAutoDelete(t.id);
          render();
          try { await api("toggle", { id: t.id }); }
          catch (err) { refresh(); }
        });
        const span = document.createElement("span");
        span.className = "text";
        span.textContent = t.text;
        const del = document.createElement("button");
        del.className = "del";
        del.type = "button";
        del.title = "Delete";
        del.textContent = "✕";
        del.addEventListener("click", async () => {
          // Optimistic remove
          todos = todos.filter(x => x.id !== t.id);
          render();
          try { await api("delete", { id: t.id }); }
          catch (err) { refresh(); }
        });
        li.append(cb, span, del);
        listEl.appendChild(li);
      });
      // Items that arrived already-done (e.g. ticked from a phone) get the same 15s grace too.
      todos.forEach(t => {
        if (t.done && !todoFadeTimers.has(t.id)) scheduleAutoDelete(t.id);
      });
    }

    function renderError(err) {
      listEl.innerHTML = "";
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = "Can't reach to-do list — retrying…";
      listEl.appendChild(li);
    }

    formEl.addEventListener("submit", async e => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      // Optimistic insert with temp id
      const temp = { id: "tmp:" + Date.now(), text, done: false };
      todos.unshift(temp);
      render();
      try {
        const data = await api("add", { text });
        if (data.todo) {
          // Swap temp for server item
          const idx = todos.findIndex(x => x.id === temp.id);
          if (idx >= 0) todos[idx] = data.todo;
          render();
        }
      } catch (err) {
        // Roll back temp item, refetch
        todos = todos.filter(x => x.id !== temp.id);
        refresh();
      }
    });

    refresh();
    setInterval(refresh, 60 * 1000); // poll for changes from phones every 60s

    // ---------- Weather ----------
    const ICONS = {
      "01": "☀️", "02": "🌤️", "03": "⛅", "04": "☁️",
      "09": "🌧️", "10": "🌦️", "11": "⛈️", "13": "❄️", "50": "🌫️"
    };
    async function loadWeather() {
      if (!OPENWEATHER_API_KEY || OPENWEATHER_API_KEY === "YOUR_API_KEY") {
        document.getElementById("w-desc").textContent = "Add OpenWeather API key";
        return;
      }
      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(CITY)}&appid=${OPENWEATHER_API_KEY}&units=metric`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const d = await res.json();
        const code = (d.weather?.[0]?.icon || "01d").slice(0, 2);
        document.getElementById("w-icon").textContent = ICONS[code] || "🌡️";
        document.getElementById("w-temp").textContent = Math.round(d.main.temp) + "°";
        document.getElementById("w-desc").textContent = d.weather?.[0]?.description || "";
        document.getElementById("w-hi").textContent = Math.round(d.main.temp_max) + "°";
        document.getElementById("w-lo").textContent = Math.round(d.main.temp_min) + "°";
        document.getElementById("w-feels").textContent = Math.round(d.main.feels_like) + "°";
      } catch (err) {
        document.getElementById("w-desc").textContent = "Weather unavailable";
      }
    }
    async function loadHourly() {
      if (!OPENWEATHER_API_KEY || OPENWEATHER_API_KEY === "YOUR_API_KEY") return;
      const target = document.getElementById("w-hourly");
      if (!target) return;
      try {
        const url = `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(CITY)}&appid=${OPENWEATHER_API_KEY}&units=metric&cnt=6`;
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const d = await res.json();
        target.textContent = "";
        (d.list || []).slice(0, 6).forEach(item => {
          const cell = document.createElement("div");
          cell.className = "h";
          // Highlight rain (10/09/11) so "will it rain at 3pm?" pops
          const code = (item.weather?.[0]?.icon || "01d").slice(0, 2);
          if (code === "09" || code === "10" || code === "11") cell.classList.add("rain");
          const when = document.createElement("div");
          when.className = "when";
          const hr = new Intl.DateTimeFormat("en-GB", {
            timeZone: TZ, hour: "2-digit", hour12: false
          }).format(new Date(item.dt * 1000));
          when.textContent = hr.replace(/^0/, "") + "h";
          const ic = document.createElement("div");
          ic.className = "icon";
          ic.textContent = ICONS[code] || "🌡";
          const t = document.createElement("div");
          t.className = "t";
          t.textContent = Math.round(item.main.temp) + "°";
          cell.append(when, ic, t);
          target.appendChild(cell);
        });
      } catch (err) {
        // Hourly is nice-to-have — fail quietly
      }
    }
    // ---------- Routines (per-kid, daily reset, time-windowed) ----------
    const ROUTINES = {
      morning: {
        "eitan-morning": ["Breakfast","Get Dressed","Brush Teeth","Socks and Shoes","Vitamin","Water Bottle","Pack a Snack","Pack Your Bag","Free Time / TV :)"],
        "tamar-morning": ["Breakfast","Get Dressed","Brush Teeth","Socks and Shoes","Hair","Water Bottle","Pack a Snack","Pack Your Bag","Free Time / TV :)"]
      },
      evening: {
        "eitan-evening": ["Homework","(Optional) TV / Games","Dinner Prep","Dinner","House Chores","(Optional) Dessert","Shower","PJ","Brush Teeth","Reading Time (in bed)"],
        "tamar-evening": ["Homework","(Optional) TV / Games","Dinner Prep","Dinner","House Chores","(Optional) Dessert","Shower","PJ","Brush Teeth","Reading Time (in bed)"]
      }
    };
    function todayKey() {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(new Date());
    }
    function routineStorageKey(kid) { return `routine:${todayKey()}:${kid}`; }
    function loadRoutine(kid) {
      try { return new Set(JSON.parse(localStorage.getItem(routineStorageKey(kid))) || []); }
      catch { return new Set(); }
    }
    function saveRoutine(kid, set) {
      localStorage.setItem(routineStorageKey(kid), JSON.stringify([...set]));
    }
    function pruneOldRoutines() {
      const today = todayKey();
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && (k.startsWith("routine:") || k.startsWith("morning:")) && !k.includes(`:${today}:`)) {
          localStorage.removeItem(k);
        }
      }
    }
    const ITEM_ICONS = {
      "Breakfast": "🥣",
      "Get Dressed": "👕",
      "Brush Teeth": "🪥",
      "Socks and Shoes": "🧦",
      "Vitamin": "💊",
      "Hair": "💇",
      "Water Bottle": "💧",
      "Pack a Snack": "🍎",
      "Pack Your Bag": "🎒",
      "Free Time / TV :)": "📺",
      "Homework": "✏️",
      "(Optional) TV / Games": "🎮",
      "Dinner Prep": "🍳",
      "Dinner": "🍽️",
      "House Chores": "🧹",
      "(Optional) Dessert": "🍰",
      "Shower": "🚿",
      "PJ": "🩳",
      "Reading Time (in bed)": "📚"
    };
    function cleanLabel(label) {
      return label.replace(/^\(Optional\)\s*/, "");
    }
    // ---------- Celebration (morning routine completion) ----------
    const CELEBRATION_EMOJI = ["🎉","✨","⭐","🎊","💫","🌟","🎈","🥳"];
    function celebrationKey(kid) { return `celebrated:${todayKey()}:${kid}`; }
    function maybeCelebrate(kid, allDone, kidEl) {
      if (!allDone) return;
      if (!kid.endsWith("-morning")) return; // morning only for now
      if (localStorage.getItem(celebrationKey(kid))) return;
      localStorage.setItem(celebrationKey(kid), "1");
      fireCelebration(kid, kidEl);
    }
    function fireCelebration(kid, kidEl) {
      const name = kid.split("-")[0];
      const display = name.charAt(0).toUpperCase() + name.slice(1);
      const accent = name === "eitan" ? "var(--cobalt)" : "var(--terracotta)";
      const wrap = document.createElement("div");
      wrap.className = "celebration";
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.appendChild(document.createTextNode("🎉 You did it!"));
      const nameEl = document.createElement("span");
      nameEl.className = "name";
      nameEl.style.color = accent;
      nameEl.textContent = display;
      toast.appendChild(nameEl);
      wrap.appendChild(toast);
      for (let i = 0; i < 44; i++) {
        const c = document.createElement("span");
        c.className = "confetti";
        c.textContent = CELEBRATION_EMOJI[i % CELEBRATION_EMOJI.length];
        c.style.left = Math.random() * 100 + "vw";
        c.style.animationDelay = (Math.random() * 0.7) + "s";
        c.style.animationDuration = (1.8 + Math.random() * 1.6) + "s";
        c.style.fontSize = (18 + Math.random() * 26) + "px";
        wrap.appendChild(c);
      }
      document.body.appendChild(wrap);
      if (kidEl) {
        kidEl.classList.add("celebrating");
        setTimeout(() => kidEl.classList.remove("celebrating"), 1300);
      }
      setTimeout(() => wrap.classList.add("fading"), 2500);
      setTimeout(() => wrap.remove(), 3300);
    }

    function renderRoutines() {
      pruneOldRoutines();
      const all = { ...ROUTINES.morning, ...ROUTINES.evening };
      Object.entries(all).forEach(([kid, items]) => {
        const ul = document.querySelector(`.kid[data-kid="${kid}"] ul`);
        if (!ul) return;
        const checked = loadRoutine(kid);
        ul.innerHTML = "";
        items.forEach((label, idx) => {
          const li = document.createElement("li");
          if (checked.has(idx)) li.classList.add("done");
          if (label.startsWith("(Optional")) li.classList.add("optional");

          const icon = document.createElement("span");
          icon.className = "icon";
          icon.textContent = ITEM_ICONS[label] || "•";

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = checked.has(idx);
          cb.addEventListener("change", () => {
            const set = loadRoutine(kid);
            if (cb.checked) set.add(idx); else set.delete(idx);
            saveRoutine(kid, set);
            renderRoutines();
          });

          const labelEl = document.createElement("span");
          labelEl.className = "label";
          labelEl.textContent = cleanLabel(label);

          li.append(cb, icon, labelEl);
          li.addEventListener("click", e => { if (e.target.tagName !== "INPUT") cb.click(); });
          ul.appendChild(li);
        });

        const prog = document.getElementById(`prog-${kid}`);
        if (prog) prog.textContent = `${checked.size}/${items.length}`;
        const bar = document.getElementById(`bar-${kid}`);
        if (bar) bar.style.width = `${Math.round((checked.size / items.length) * 100)}%`;

        // Celebrate when all (incl. optional) are done — morning only.
        const kidEl = document.querySelector(`.kid[data-kid="${kid}"]`);
        maybeCelebrate(kid, checked.size === items.length, kidEl);
      });
    }
    function nowMinutesLondon() {
      // Use toLocaleTimeString which is widely supported on old WebViews
      // (formatToParts can fail or be unimplemented on older Chromium).
      try {
        const s = new Date().toLocaleTimeString("en-GB", {
          timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
        });
        const m = s.match(/(\d{1,2}):(\d{2})/);
        if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      } catch (e) {}
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }
    // Belt-and-suspenders: set both the HTML attribute and style.display.
    // Old Android WebViews sometimes ignore .hidden property assignment.
    function setCardVisible(id, visible) {
      const el = document.getElementById(id);
      if (!el) return;
      if (visible) {
        el.removeAttribute("hidden");
        el.style.display = "";
      } else {
        el.setAttribute("hidden", "");
        el.style.display = "none";
      }
    }
    function updateRoutineVisibility() {
      try {
        const mins = nowMinutesLondon();
        const showMorning = mins >= 6 * 60 && mins < 9 * 60;
        const showEvening = mins >= 15 * 60 + 30 && mins < 20 * 60 + 30;
        setCardVisible("morning-card", showMorning);
        setCardVisible("evening-card", showEvening);
        const dbg = document.getElementById("dbg");
        if (dbg) dbg.textContent = "mins=" + mins;
      } catch (e) {
        // On any error, hide both cards
        setCardVisible("morning-card", false);
        setCardVisible("evening-card", false);
        const dbg = document.getElementById("dbg");
        if (dbg) dbg.textContent = "vis-err:" + e.message;
      }
    }
    renderRoutines();
    updateRoutineVisibility();
    setInterval(() => { renderRoutines(); updateRoutineVisibility(); }, 60 * 1000);

    loadWeather();
    loadHourly();
    setInterval(() => { loadWeather(); loadHourly(); }, 15 * 60 * 1000); // every 15 min

    // ---------- Calendar (Google-Cal-style day view, via Vercel proxy) ----------
    const CAL_PROXY_URL = "https://family-dashboard-proxy.vercel.app/api/cal";
    const DAY_START_H = 6;       // timeline starts 06:00
    const DAY_END_H   = 23;      // timeline ends 23:00 (= 17 hour rules: 06..22)
    const HOUR_H      = 28;      // px per hour, must match --hour-h CSS var

    function dayKey(d) {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TZ, year:"numeric", month:"2-digit", day:"2-digit" }).format(d);
    }
    function dayLabel(d) {
      const today = dayKey(new Date());
      const tomorrow = dayKey(new Date(Date.now() + 86400000));
      const k = dayKey(d);
      const human = new Intl.DateTimeFormat("en-GB", { timeZone: TZ, weekday: "long", day: "numeric", month: "short" }).format(d);
      if (k === today) return { label: "Today · " + human, today: true };
      if (k === tomorrow) return { label: "Tomorrow · " + human, today: false };
      return { label: human, today: false };
    }
    function fmtTime(d) {
      return new Intl.DateTimeFormat("en-GB", { timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false }).format(d);
    }
    // London-tz minutes-since-midnight for any Date
    function londonMins(d) {
      try {
        const s = new Intl.DateTimeFormat("en-GB", {
          timeZone: TZ, hour: "2-digit", minute: "2-digit", hour12: false
        }).format(d);
        const m = s.match(/(\d{1,2}):(\d{2})/);
        if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      } catch (e) {}
      return d.getHours() * 60 + d.getMinutes();
    }

    async function loadCalendar() {
      try {
        const res = await fetch(CAL_PROXY_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const { events } = await res.json();
        renderCalendar(events || []);
      } catch (err) {
        const future = document.getElementById("cal-future");
        if (future) {
          while (future.firstChild) future.removeChild(future.firstChild);
          const wrap = document.createElement("div");
          wrap.className = "cal-error";
          wrap.appendChild(document.createTextNode("Calendar unavailable"));
          const small = document.createElement("small");
          small.textContent = String(err.message || err);
          wrap.appendChild(small);
          future.appendChild(wrap);
        }
      }
    }

    function renderCalendar(events) {
      const allDayEl = document.getElementById("cal-allday");
      const todayEl  = document.getElementById("cal-today");
      const futureEl = document.getElementById("cal-future");
      if (!allDayEl || !todayEl || !futureEl) return;
      [allDayEl, todayEl, futureEl].forEach(el => {
        while (el.firstChild) el.removeChild(el.firstChild);
      });

      const today = dayKey(new Date());
      const todayAllDay = [];
      const todayTimed = [];
      const futureByDay = new Map();
      for (const ev of events) {
        const start = new Date(ev.start);
        const k = dayKey(start);
        if (k === today) {
          (ev.allDay ? todayAllDay : todayTimed).push(ev);
        } else if (k > today) { // future only
          if (!futureByDay.has(k)) futureByDay.set(k, { date: start, items: [] });
          futureByDay.get(k).items.push(ev);
        }
      }

      // ─── All-day chips
      todayAllDay.forEach(ev => {
        const c = document.createElement("div");
        c.className = "chip";
        c.textContent = ev.title;
        allDayEl.appendChild(c);
      });

      // ─── Today timeline: hour markers
      for (let h = DAY_START_H; h <= DAY_END_H - 1; h++) {
        const m = document.createElement("div");
        m.className = "hour-mark";
        m.style.top = ((h - DAY_START_H) * HOUR_H) + "px";
        const lbl = document.createElement("span");
        lbl.className = "h-label";
        lbl.textContent = String(h).padStart(2, "0");
        m.appendChild(lbl);
        todayEl.appendChild(m);
      }

      // ─── Now-line (positioned each tick)
      const nowLine = document.createElement("div");
      nowLine.className = "cal-now";
      nowLine.id = "cal-now";
      todayEl.appendChild(nowLine);

      // ─── Event blocks
      const nowMins = nowMinutesLondon();
      const visibleMins = (DAY_END_H - DAY_START_H) * 60;
      todayTimed.forEach(ev => {
        const sM = londonMins(new Date(ev.start));
        const eM = londonMins(new Date(ev.end));
        const startOff = sM - DAY_START_H * 60;
        const endOff   = eM - DAY_START_H * 60;
        if (endOff <= 0 || startOff >= visibleMins) return;   // outside visible window
        const clampedStart = Math.max(0, startOff);
        const clampedEnd   = Math.min(visibleMins, endOff);
        const top = (clampedStart / 60) * HOUR_H;
        const height = Math.max(22, ((clampedEnd - clampedStart) / 60) * HOUR_H);

        const block = document.createElement("div");
        block.className = "cal-block" + (eM <= nowMins ? " past" : "");
        block.style.top = top + "px";
        block.style.height = height + "px";
        const title = document.createElement("div");
        title.className = "title";
        title.textContent = ev.title;
        const when = document.createElement("div");
        when.className = "when";
        when.textContent = `${fmtTime(new Date(ev.start))}–${fmtTime(new Date(ev.end))}`;
        block.append(title, when);
        if (ev.location) block.title = ev.location;
        todayEl.appendChild(block);
      });
      positionNowLine();

      // ─── Future days (max 2)
      let dayCount = 0;
      for (const [, g] of futureByDay) {
        if (++dayCount > 2) break;
        const head = document.createElement("div");
        head.className = "day-head";
        head.textContent = dayLabel(g.date).label;
        futureEl.appendChild(head);
        g.items.slice(0, 4).forEach(ev => {
          const row = document.createElement("div");
          row.className = "row";
          const t = document.createElement("div");
          t.className = "t";
          t.textContent = ev.allDay ? "all day" : fmtTime(new Date(ev.start));
          const ti = document.createElement("div");
          ti.className = "ti";
          ti.textContent = ev.title;
          row.append(t, ti);
          futureEl.appendChild(row);
        });
      }

      if (!todayAllDay.length && !todayTimed.length && !futureByDay.size) {
        const empty = document.createElement("div");
        empty.className = "cal-empty";
        empty.textContent = "A quiet stretch ahead.";
        futureEl.appendChild(empty);
      }
    }

    function positionNowLine() {
      const el = document.getElementById("cal-now");
      if (!el) return;
      const m = nowMinutesLondon();
      const startM = DAY_START_H * 60;
      const endM = DAY_END_H * 60;
      if (m < startM || m > endM) {
        el.style.display = "none";
        return;
      }
      el.style.display = "block";
      el.style.top = (((m - startM) / 60) * HOUR_H) + "px";
    }

    loadCalendar();
    setInterval(loadCalendar, 5 * 60 * 1000); // refetch every 5 min
    setInterval(positionNowLine, 60 * 1000);  // move the now-line every minute

    // ---------- Daily quote (rotates by day-of-year) ----------
    const QUOTES = [
      "Be brave. Be kind. Be you.",
      "Today is a gift — that's why it's called the present.",
      "Small steps, big dreams.",
      "Do one thing every day that makes you proud.",
      "Where there is love, there is life.",
      "Slow is smooth, smooth is fast.",
      "Make today ridiculously amazing.",
      "Eat the frog first.",
      "Done is better than perfect.",
      "Curiosity is the engine of achievement.",
      "Pack the snacks, the rest will follow.",
      "Tiny victories count too.",
      "The morning is wiser than the evening.",
      "Listen more than you talk.",
      "Be the reason someone smiles today.",
      "Begin at the beginning.",
      "A good plan today beats a perfect plan tomorrow.",
      "Adventure is out there.",
      "Mistakes are proof you're trying.",
      "Choose the harder right over the easier wrong.",
      "Be patient with yourself.",
      "Less hurry, more hustle.",
      "Read a little, walk a little, laugh a lot.",
      "Don't wait for perfect — start now.",
      "Stay curious.",
      "What you do daily matters more than what you do occasionally.",
      "Family is the compass that guides us.",
      "Try the new thing.",
      "Notice the small wonders.",
      "First we make our routines, then our routines make us.",
      "Energy follows attention.",
      "Be kind, for everyone is fighting a hard battle.",
      "The best way out is always through.",
      "Hard work beats talent when talent doesn't work hard.",
      "Look up.",
      "It always seems impossible until it's done."
    ];
    function dayOfYear() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      return Math.floor((now - start) / 86400000);
    }
    function renderDailyQuote() {
      const el = document.getElementById("daily-quote");
      if (!el) return;
      el.textContent = QUOTES[dayOfYear() % QUOTES.length];
    }
    renderDailyQuote();
    // Re-check every hour in case the dashboard runs across midnight
    setInterval(renderDailyQuote, 60 * 60 * 1000);

    // ---------- TfL transit (Northern Line + Bus 102) ----------
    // TfL severity scale: 10 = Good Service, 9 = Minor Delays, 6 or below = Severe
    async function loadTfl() {
      const lines = [
        { id: "northern", el: "tfl-northern" },
        { id: "102",      el: "tfl-102" }
      ];
      await Promise.all(lines.map(async ({ id, el }) => {
        const row = document.getElementById(el);
        const span = row && row.querySelector(".status");
        if (!span) return;
        try {
          const res = await fetch(`https://api.tfl.gov.uk/Line/${id}/Status`, { cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          const desc = data?.[0]?.lineStatuses?.[0]?.statusSeverityDescription || "Unknown";
          const sev  = data?.[0]?.lineStatuses?.[0]?.statusSeverity ?? 10;
          const tone = sev >= 10 ? "good" : sev >= 7 ? "minor" : "severe";
          span.textContent = desc;
          span.classList.remove("good", "minor", "severe");
          span.classList.add(tone);
        } catch (e) {
          span.textContent = "Unavailable";
          span.classList.remove("good", "minor");
          span.classList.add("severe");
        }
      }));
    }
    loadTfl();
    setInterval(loadTfl, 5 * 60 * 1000); // every 5 min

    // ---------- Exit-to-Portal long-press (bottom-right corner, 2 s) ----------
    // Kotlin side: shouldOverrideUrlLoading intercepts "kiosk://exit" → finishAndRemoveTask()
    (function() {
      const btn = document.getElementById("exit-corner");
      if (!btn) return;
      let timer;
      function arm(e) {
        if (e.cancelable) e.preventDefault();
        clearTimeout(timer);
        timer = setTimeout(function() {
          window.location.href = "kiosk://exit";
        }, 2000);
      }
      function disarm() { clearTimeout(timer); }
      btn.addEventListener("touchstart",  arm,    { passive: false });
      btn.addEventListener("touchend",    disarm, { passive: true });
      btn.addEventListener("touchcancel", disarm, { passive: true });
      // Mouse fallback for desktop testing
      btn.addEventListener("mousedown",  arm);
      btn.addEventListener("mouseup",    disarm);
      btn.addEventListener("mouseleave", disarm);
    })();
  </script>
